<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Grader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <h1>🤖 Auto Grader</h1>
        <p>Paste Java code — compile &amp; run automatically</p>
    </div>

    <div class="container single-col">
        <main class="main">
            <div id="editorView">
                <h2>✏️ Submit Java Code</h2>
                <textarea id="codeEditor" placeholder="Paste your Java code here..."></textarea>
                <button onclick="submitCode()" id="submitBtn">▶ Run Code</button>
                <div id="result"></div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
