<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Grader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }

        h1 { color: #333; margin-bottom: 10px; text-align: center; }

        .subtitle {
            text-align: center; color: #666;
            margin-bottom: 30px; font-size: 14px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block; margin-bottom: 8px;
            color: #333; font-weight: 600;
        }

        textarea {
            width: 100%; padding: 12px;
            border: 2px solid #ddd; border-radius: 5px;
            font-size: 14px; font-family: 'Courier New', monospace;
            min-height: 320px; resize: vertical;
        }

        textarea:focus { border-color: #667eea; outline: none; }

        .button-group { display: flex; gap: 10px; margin-top: 20px; }

        button {
            flex: 1; padding: 12px 24px; border: none;
            border-radius: 5px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }

        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }

        .spinner { display: none; text-align: center; padding: 20px; }
        .spinner.show { display: block; }

        .error {
            background: #fee; color: #c00; padding: 15px;
            border-radius: 5px; margin-top: 15px; display: none;
        }
        .error.show { display: block; }

        .result {
            margin-top: 30px; padding: 20px;
            background: #f9f9f9; border-radius: 5px; display: none;
        }
        .result.show { display: block; }

        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 12px;
            font-weight: 600; font-size: 14px; margin-bottom: 16px;
        }
        .status-success { background: #d4edda; color: #155724; }
        .status-compile_error { background: #f8d7da; color: #721c24; }
        .status-runtime_error { background: #fff3cd; color: #856404; }
        .status-timeout { background: #f8d7da; color: #721c24; }
        .status-error { background: #f8d7da; color: #721c24; }

        .result-item { margin-bottom: 15px; }
        .result-label { font-weight: 600; color: #667eea; margin-bottom: 5px; }

        .result-value {
            background: white; padding: 10px;
            border-left: 4px solid #667eea;
            white-space: pre-wrap; word-break: break-word;
            font-family: 'Courier New', monospace; font-size: 13px;
        }

        .result-value.empty { color: #999; font-style: italic; font-family: inherit; }
    </style>
</head>
<body>
<div class="container">
    <h1>🤖 Auto Grader</h1>
    <p class="subtitle">Paste Java code — compile &amp; run automatically</p>

    <form id="gradeForm">
        <div class="form-group">
            <label for="codeInput">Java Code</label>
            <textarea id="codeInput" placeholder="Paste your Java code here..." required></textarea>
        </div>

        <div class="button-group">
            <button type="submit" class="btn-primary">▶ Run Code</button>
            <button type="button" class="btn-secondary" onclick="clearForm()">🗑 Clear</button>
        </div>
    </form>

    <div class="spinner" id="spinner">⏳ Compiling and running...</div>
    <div class="error" id="errorBox"></div>

    <div class="result" id="resultBox">
        <h2>📋 Result</h2>
        <span id="statusBadge" class="status-badge"></span>

        <div class="result-item" id="compileErrorItem" style="display:none;">
            <div class="result-label">Compile Error</div>
            <div class="result-value" id="compileError"></div>
        </div>

        <div class="result-item">
            <div class="result-label">Standard Output</div>
            <div class="result-value" id="stdout"></div>
        </div>

        <div class="result-item" id="stderrItem" style="display:none;">
            <div class="result-label">Standard Error / Runtime Error</div>
            <div class="result-value" id="stderr"></div>
        </div>

        <div class="result-item">
            <div class="result-label">Class Name</div>
            <div class="result-value" id="className"></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('gradeForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const code = document.getElementById('codeInput').value.trim();
        if (!code) {
            showError('Please enter Java code.');
            return;
        }

        document.getElementById('spinner').classList.add('show');
        document.getElementById('errorBox').classList.remove('show');
        document.getElementById('resultBox').classList.remove('show');

        try {
            const response = await fetch('/api/execute', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code})
            });

            const data = await response.json();

            if (!response.ok) {
                showError(data.error || 'Server error');
                return;
            }

            displayResult(data);
        } catch (err) {
            showError('Network error: ' + err.message);
        } finally {
            document.getElementById('spinner').classList.remove('show');
        }
    });

    function displayResult(data) {
        const status = data.status || 'unknown';
        const badge = document.getElementById('statusBadge');
        badge.textContent = status.toUpperCase().replace('_', ' ');
        badge.className = 'status-badge status-' + status;

        const compileError = (data.compile_error || '').trim();
        if (compileError) {
            document.getElementById('compileError').textContent = compileError;
            document.getElementById('compileErrorItem').style.display = 'block';
        } else {
            document.getElementById('compileErrorItem').style.display = 'none';
        }

        const stdout = (data.stdout || '').trim();
        const stdoutEl = document.getElementById('stdout');
        if (stdout) {
            stdoutEl.textContent = stdout;
            stdoutEl.className = 'result-value';
        } else {
            stdoutEl.textContent = '(no output)';
            stdoutEl.className = 'result-value empty';
        }

        const stderr = (data.stderr || '').trim();
        if (stderr && status !== 'compile_error') {
            document.getElementById('stderr').textContent = stderr;
            document.getElementById('stderrItem').style.display = 'block';
        } else {
            document.getElementById('stderrItem').style.display = 'none';
        }

        document.getElementById('className').textContent = data.class_name || 'unknown';

        document.getElementById('resultBox').classList.add('show');
    }

    function showError(msg) {
        const el = document.getElementById('errorBox');
        el.textContent = msg;
        el.classList.add('show');
    }

    function clearForm() {
        document.getElementById('gradeForm').reset();
        document.getElementById('resultBox').classList.remove('show');
        document.getElementById('errorBox').classList.remove('show');
    }
</script>
</body>
</html>
